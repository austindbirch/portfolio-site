name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Fetch GitHub data
        run: npm run fetch-github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npx next build

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Build and push Docker image
        run: |
          flyctl auth docker
          docker build -t registry.fly.io/austindbirch:${{ github.sha }} .
          docker push registry.fly.io/austindbirch:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --image registry.fly.io/austindbirch:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
